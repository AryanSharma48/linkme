services:

  db:
    image: postgres:16-alpine
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: aryan
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: url_shortner
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7.4-alpine
    container_name: redis_cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: url_shortner
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DATABASE_URL: postgresql://aryan:${POSTGRES_PASSWORD}@db:5432/url_shortner
      PORT: 3000
    ports: 
       - "3000:3000"
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
  redis_data:
    driver: local